{% set name = "flask-injector" %}
{% set version = "0.15.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/Flask-Injector-{{ version }}.tar.gz
  sha256: 567c69da7657b96565db990bb7c87cc0acf04e383714341954902f1ef85c5875

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - flask >=2.2.0
    - injector >=0.20.0
    - python >={{ python_min }}

test:
  imports:
    - flask_injector
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/alecthomas/flask_injector
  summary: Adds Injector, a Dependency Injection framework, support to Flask.
  # License file manually packaged: See: https://github.com/alecthomas/flask_injector/pull/58
  license: BSD-3-Clause
  license_file: COPYING

extra:
  recipe-maintainers:
    - fuglede
